version: '3.8'
services:
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports: ["5000:5000"]
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/medical_research
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    env_file: ./backend/.env

  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [backend]
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api

volumes:
  mongo_data:
